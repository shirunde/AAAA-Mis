{% if pages > 1 %}
<nav><ul class="pagination justify-content-center">
    <li class="page-item {{ 'disabled' if page <= 1 }}"><a class="page-link" href="?page={{ page-1 }}{% if search %}&search={{ search }}{% endif %}{% if type %}&type={{ type }}{% endif %}{% if action_filter %}&action={{ action_filter }}{% endif %}">&laquo;</a></li>
    {% for p in range(1, pages+1) %}
    <li class="page-item {{ 'active' if p == page }}"><a class="page-link" href="?page={{ p }}{% if search %}&search={{ search }}{% endif %}{% if type %}&type={{ type }}{% endif %}{% if action_filter %}&action={{ action_filter }}{% endif %}">{{ p }}</a></li>
    {% endfor %}
    <li class="page-item {{ 'disabled' if page >= pages }}"><a class="page-link" href="?page={{ page+1 }}{% if search %}&search={{ search }}{% endif %}{% if type %}&type={{ type }}{% endif %}{% if action_filter %}&action={{ action_filter }}{% endif %}">&raquo;</a></li>
</ul></nav>
<small class="text-muted d-block text-center">共 {{ total }} 条，第 {{ page }}/{{ pages }} 页</small>
{% endif %}
