{% extends "base_simple.html" %}
{% block title %}500 - 服务器错误{% endblock %}
{% block page_title %}服务器错误{% endblock %}
{% block content %}
<div class="text-center py-5">
    <div style="font-size: 6rem; color: #dee2e6;">500</div>
    <h4 class="mb-3">服务器内部错误</h4>
    <p class="text-muted mb-4">服务器遇到意外错误，请稍后重试</p>
    <a href="javascript:history.back()" class="btn btn-outline-secondary me-2"><i class="bi bi-arrow-left me-1"></i>返回上页</a>
    <a href="{{ url_for('index') }}" class="btn btn-primary me-2"><i class="bi bi-house me-1"></i>返回首页</a>
    <a href="javascript:location.reload()" class="btn btn-outline-primary"><i class="bi bi-arrow-clockwise me-1"></i>刷新重试</a>
</div>
{% endblock %}
