{% extends "base.html" %}
{% block title %}专业管理{% endblock %}
{% block content %}
<h4 class="mb-3"><i class="bi bi-building"></i> 专业管理</h4>
<button class="btn btn-primary btn-sm mb-3" data-bs-toggle="modal" data-bs-target="#addModal">+ 添加专业</button>
<table class="table table-bordered table-hover">
    <thead class="table-dark"><tr><th>ID</th><th>专业名称</th><th>专业代码</th><th>描述</th><th>操作</th></tr></thead>
    <tbody>
        {% for m in majors %}
        <tr><td>{{ m.id }}</td><td>{{ m.name }}</td><td>{{ m.code }}</td><td>{{ m.description or '' }}</td>
            <td>
                <button class="btn btn-sm btn-outline-primary" data-bs-toggle="modal" data-bs-target="#editModal{{ m.id }}">编辑</button>
                <form method="post" action="{{ url_for('admin.majors_delete', mid=m.id) }}" style="display:inline" onsubmit="return confirm('确认删除？')">
                    <button class="btn btn-sm btn-outline-danger">删除</button>
                </form>
            </td>
        </tr>
        {% endfor %}
    </tbody>
</table>
<!-- Add/Edit modals similar to semesters... -->
<div class="modal fade" id="addModal" tabindex="-1">
    <div class="modal-dialog"><div class="modal-content">
        <form method="post" action="{{ url_for('admin.majors_add') }}">
            <div class="modal-header"><h5 class="modal-title">添加专业</h5><button type="button" class="btn-close" data-bs-dismiss="modal"></button></div>
            <div class="modal-body">
                <div class="mb-3"><label class="form-label">专业名称</label><input type="text" name="name" class="form-control" required></div>
                <div class="mb-3"><label class="form-label">专业代码</label><input type="text" name="code" class="form-control" required></div>
                <div class="mb-3"><label class="form-label">描述</label><textarea name="description" class="form-control" rows="2"></textarea></div>
            </div>
            <div class="modal-footer"><button type="submit" class="btn btn-primary">保存</button></div>
        </form>
    </div></div>
</div>
{% for m in majors %}
<div class="modal fade" id="editModal{{ m.id }}" tabindex="-1">
    <div class="modal-dialog"><div class="modal-content">
        <form method="post" action="{{ url_for('admin.majors_edit', mid=m.id) }}">
            <div class="modal-header"><h5 class="modal-title">编辑专业</h5><button type="button" class="btn-close" data-bs-dismiss="modal"></button></div>
            <div class="modal-body">
                <div class="mb-3"><label class="form-label">专业名称</label><input type="text" name="name" class="form-control" value="{{ m.name }}" required></div>
                <div class="mb-3"><label class="form-label">专业代码</label><input type="text" name="code" class="form-control" value="{{ m.code }}" required></div>
                <div class="mb-3"><label class="form-label">描述</label><textarea name="description" class="form-control" rows="2">{{ m.description or '' }}</textarea></div>
            </div>
            <div class="modal-footer"><button type="submit" class="btn btn-primary">保存修改</button></div>
        </form>
    </div></div>
</div>
{% endfor %}
{% endblock %}
